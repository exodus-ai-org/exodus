name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api-tests:
    name: API Integration Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build app
        run: pnpm run build
      - name: Start app in background
        # ubuntu-latest ships with xvfb preinstalled. --no-sandbox is required
        # because GitHub-hosted runners don't support Chromium's setuid-sandbox
        # helper. nohup keeps the process alive once this step exits so the
        # next step can talk to its Hono server.
        run: |
          nohup xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            npx electron ./out/main/index.js --no-sandbox \
            > /tmp/electron.log 2>&1 &
          # Poll until the Hono server is reachable instead of `sleep 10` —
          # surfaces "electron didn't start" as a real failure with logs.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:60223/api/settings > /dev/null; then
              echo "App is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start within 60s" >&2
          echo "--- /tmp/electron.log ---" >&2
          cat /tmp/electron.log >&2 || true
          exit 1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GOOGLE_CLOUD: ${{ secrets.GOOGLE_CLOUD }}
          EXODUS_DISABLE_AUTO_UPDATE: '1'
      - name: Run API tests
        run: pnpm test:e2e:api
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GOOGLE_CLOUD: ${{ secrets.GOOGLE_CLOUD }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: api-test-report
          path: playwright-report/
          retention-days: 30
      - name: Upload electron log on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: electron-log
          path: /tmp/electron.log
          retention-days: 7

  e2e-tests:
    name: Electron E2E Tests
    timeout-minutes: 30
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build app
        run: pnpm run build
      - name: Run E2E tests
        run: pnpm test:e2e:electron
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-test-report
          path: playwright-report/
          retention-days: 30
